<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- 这个示例依然使用浏览器端 Babel 来解释 JSX -->
    <script src="../build/react.development.js"></script>
    <script src="../build/react-dom.development.js"></script>
    <script src="../build/babel.min.js"></script>
  </head>
  <body>
    <!-- 所有示例都复用这个挂载点 -->
    <div id="example"></div>
    <script type="text/babel">
      // JSX 元素本身也可以放进数组里，React 会把它们依次渲染出来。
      // 这说明“数组”并不是特殊语法，React 只是在渲染时把数组展开了。
      var arr = [
        <h1 key="1">Hello world!</h1>,
        <h2 key="2">React is awesome</h2>,
         <h3 key="3">React is awesome2</h3>,
      ];
      // 把数组直接放进 JSX 中，等价于展开多个子节点
      ReactDOM.render(
        <div>{arr}</div>,
        document.getElementById('example')
      );
    </script>
  </body>
</html>
