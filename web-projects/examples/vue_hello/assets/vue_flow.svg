<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Vue Hello 处理流程与分层</title>
  <desc id="desc">Vue 3 + Vite 示例从 HTML 宿主、main.js 创建应用、App.vue 单文件组件、样式到浏览器渲染的流程图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .sub { font: 400 14px Arial, sans-serif; fill: #374151; }
      .txt { font: 700 16px Arial, sans-serif; fill: #111827; }
      .note { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="48" y="44" class="title">Vue Hello 处理流程（Vue 3 + Vite）</text>

  <rect x="60" y="86" width="220" height="78" class="box"/>
  <text x="88" y="119" class="txt">index.html</text>
  <text x="88" y="145" class="sub">HTML 宿主层：提供 #app</text>

  <rect x="330" y="86" width="220" height="78" class="box"/>
  <text x="358" y="119" class="txt">src/main.js</text>
  <text x="358" y="145" class="sub">入口层：createApp(App).mount</text>

  <rect x="600" y="86" width="250" height="78" class="box"/>
  <text x="628" y="119" class="txt">src/App.vue</text>
  <text x="628" y="145" class="sub">单文件组件层：template/script/style</text>

  <rect x="200" y="245" width="250" height="86" class="box"/>
  <text x="228" y="279" class="txt">&lt;template&gt;</text>
  <text x="228" y="305" class="sub">视图结构层：页面 HTML 结构</text>

  <rect x="515" y="245" width="250" height="86" class="box"/>
  <text x="543" y="279" class="txt">&lt;script setup&gt;</text>
  <text x="543" y="305" class="sub">逻辑层：响应式数据和方法</text>

  <rect x="805" y="245" width="210" height="86" class="box"/>
  <text x="833" y="279" class="txt">src/style.css</text>
  <text x="833" y="305" class="sub">全局样式层</text>

  <rect x="360" y="412" width="360" height="78" class="box"/>
  <text x="388" y="445" class="txt">Vite 编译与浏览器渲染</text>
  <text x="388" y="471" class="sub">Vue SFC 转换为可执行 JS 与 CSS</text>

  <path d="M 280 125 L 330 125" class="arrow"/>
  <path d="M 550 125 L 600 125" class="arrow"/>
  <path d="M 725 164 L 725 205 L 325 205 L 325 245" class="arrow"/>
  <path d="M 725 164 L 725 205 L 640 205 L 640 245" class="arrow"/>
  <path d="M 725 164 L 725 205 L 910 205 L 910 245" class="arrow"/>
  <path d="M 325 331 L 456 412" class="arrow"/>
  <path d="M 640 331 L 578 412" class="arrow"/>
  <path d="M 910 331 L 698 412" class="arrow"/>

  <text x="60" y="528" class="note">学习重点：Vue 当前示例没有 class 类，核心是 createApp 启动入口与 App.vue 的单文件组件分层。</text>
</svg>
