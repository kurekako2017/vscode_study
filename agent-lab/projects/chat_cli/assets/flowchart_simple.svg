<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <style>
    .box { fill:#f8fafc; stroke:#0f172a; stroke-width:1.5; rx:8; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#0f172a }
    .title { font-weight:700; font-size:16px }
    .arrow { stroke:#0f172a; stroke-width:1.6; fill:none; marker-end:url(#arrowhead) }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="20" y="26" class="text title">chat_cli 学习闭环（简化）</text>

  <!-- Boxes -->
  <rect x="40" y="60" width="220" height="50" class="box" />
  <text x="150" y="90" text-anchor="middle" class="text">命令行输入 / 参数解析</text>

  <rect x="290" y="60" width="220" height="50" class="box" />
  <text x="400" y="90" text-anchor="middle" class="text">模式决策：mock / real / auto</text>

  <rect x="540" y="60" width="220" height="50" class="box" />
  <text x="650" y="90" text-anchor="middle" class="text">客户端构建 / mock 答案</text>

  <rect x="190" y="160" width="420" height="60" class="box" />
  <text x="400" y="195" text-anchor="middle" class="text">一次性调用 或 交互循环（ask_once / run_interactive）</text>

  <rect x="290" y="250" width="220" height="50" class="box" />
  <text x="400" y="280" text-anchor="middle" class="text">format_output -> 终端输出</text>

  <!-- Arrows -->
  <path d="M260 85 L290 85" class="arrow" />
  <path d="M510 85 L540 85" class="arrow" />
  <path d="M400 110 L400 160" class="arrow" />
  <path d="M400 220 L400 250" class="arrow" />

  <!-- Loop arrow back to interactive -->
  <path d="M500 300 C 560 320, 680 320, 680 200" class="arrow" />
  <path d="M680 200 L640 200" class="arrow" />

  <!-- Notes -->
  <text x="20" y="360" class="text">提示：当缺少 `OPENAI_API_KEY` 或 SDK 时会自动降级为 Mock。</text>
  <text x="20" y="382" class="text">此 SVG 为静态图，适用于 GitHub README 显示。</text>
</svg>
