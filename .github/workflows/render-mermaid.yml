name: Render Mermaid diagrams to SVG

on:
  push:
    branches: [ main ]
    paths:
      - 'java-projects/JtProject-Next/doc/**'
      - 'scripts/render_mermaid_to_svg.py'
  workflow_dispatch: {}

jobs:
  render:
    name: Render and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Render .mmd files using mermaid-cli docker image
        uses: addnab/docker-run-action@v3
        with:
          image: minlag/mermaid-cli
          options: -v ${{ github.workspace }}:/work -w /work
          run: |
            set -e
            # find all .mmd files and render to .svg next to them
            for m in $(find java-projects/JtProject-Next/doc -name '*.mmd' -print); do
              out="${m%.mmd}.svg"
              echo "Rendering $m -> $out"
              mmdc -i "$m" -o "$out" || echo "Failed to render $m"
            done
            # also run Python script to update Markdown references (idempotent)
            python3 scripts/render_mermaid_to_svg.py || echo "render script failed"

      - name: Commit generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore(docs): render mermaid diagrams to SVG"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
