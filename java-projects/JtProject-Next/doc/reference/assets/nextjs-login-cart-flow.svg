<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">登录和购物车流程</title>
  <desc id="desc">用户提交登录信息，后端写入会话 Cookie，前端再携带 Cookie 请求购物车数据。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .cookie { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="980" height="440" fill="#ffffff"/>
  <text x="40" y="44" class="title">登录和购物车流程</text>

  <rect x="45" y="95" width="170" height="65" class="box"/>
  <text x="72" y="123" class="txt">User</text>
  <text x="72" y="145" class="sub">提交 lisa / 765</text>

  <rect x="260" y="95" width="190" height="65" class="box"/>
  <text x="288" y="123" class="txt">app/page.tsx</text>
  <text x="288" y="145" class="sub">提交登录表单</text>

  <rect x="495" y="95" width="180" height="65" class="box"/>
  <text x="523" y="123" class="txt">lib/api.ts</text>
  <text x="523" y="145" class="sub">auth login request</text>

  <rect x="720" y="95" width="210" height="65" class="box"/>
  <text x="748" y="123" class="txt">Spring Auth API</text>
  <text x="748" y="145" class="sub">验证用户名密码</text>

  <rect x="720" y="235" width="210" height="65" class="cookie"/>
  <text x="748" y="263" class="txt">Session Cookie</text>
  <text x="748" y="285" class="sub">写入 JSESSIONID</text>

  <rect x="495" y="235" width="180" height="65" class="box"/>
  <text x="523" y="263" class="txt">Cart API</text>
  <text x="523" y="285" class="sub">携带 cookie 请求</text>

  <rect x="260" y="235" width="190" height="65" class="box"/>
  <text x="288" y="263" class="txt">Cart Data</text>
  <text x="288" y="285" class="sub">返回购物车商品</text>

  <rect x="370" y="355" width="250" height="55" class="box"/>
  <text x="398" y="389" class="txt">setSession / setCart 更新页面</text>

  <path d="M 215 128 L 260 128" class="arrow"/>
  <path d="M 450 128 L 495 128" class="arrow"/>
  <path d="M 675 128 L 720 128" class="arrow"/>
  <path d="M 825 160 L 825 235" class="arrow"/>
  <path d="M 720 268 L 675 268" class="arrow"/>
  <path d="M 495 268 L 450 268" class="arrow"/>
  <path d="M 355 300 L 455 355" class="arrow"/>
</svg>
