<svg xmlns="http://www.w3.org/2000/svg" width="880" height="820" viewBox="0 0 880 820" role="img" aria-labelledby="title desc">
  <title id="title">ユーザーログイン処理フロー図</title>
  <desc id="desc">ログイン入力から認証、成功時の商品一覧表示、失敗時のログイン画面返却まで</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#334155"/></marker>
    <style>
      text { font-family: "Noto Sans JP", "Yu Gothic", Arial, sans-serif; fill: #172033; font-size: 14px; }
      .title { font-size: 24px; font-weight: 700; }
      .box { fill: #fff; stroke: #2563eb; stroke-width: 1.4; rx: 7; }
      .decision { fill: #fff7ed; stroke: #f97316; stroke-width: 1.4; }
      .db { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.4; rx: 7; }
      .line { stroke: #334155; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
      .label { font-size: 13px; fill: #475569; }
    </style>
  </defs>
  <rect width="880" height="820" fill="#fff"/>
  <text x="440" y="42" text-anchor="middle" class="title">ユーザーログイン処理フロー図</text>
  <g transform="translate(300,80)">
    <rect class="box" width="280" height="44"/><text x="140" y="28" text-anchor="middle">ログイン画面入力</text>
    <rect class="box" y="70" width="280" height="44"/><text x="140" y="98" text-anchor="middle">UserController.userlogin</text>
    <rect class="box" y="140" width="280" height="44"/><text x="140" y="168" text-anchor="middle">UserService.checkLogin</text>
    <rect class="box" y="210" width="280" height="44"/><text x="140" y="238" text-anchor="middle">UserDao.getUser</text>
    <rect class="db" y="280" width="280" height="44"/><text x="140" y="308" text-anchor="middle">CUSTOMER 検索</text>
    <polygon class="decision" points="140,350 280,392 140,434 0,392"/><text x="140" y="397" text-anchor="middle">ユーザー存在?</text>
    <polygon class="decision" points="140,470 280,512 140,554 0,512"/><text x="140" y="517" text-anchor="middle">パスワード一致?</text>
    <rect class="box" y="590" width="280" height="44"/><text x="140" y="618" text-anchor="middle">User 返却</text>
    <rect class="box" y="660" width="280" height="44"/><text x="140" y="688" text-anchor="middle">Cookie / Session 設定</text>
  </g>
  <g transform="translate(585,430)">
    <rect class="box" width="220" height="44"/><text x="110" y="28" text-anchor="middle">空 User 返却</text>
    <rect class="box" y="70" width="220" height="44"/><text x="110" y="96" text-anchor="middle">ログイン失敗メッセージ</text>
    <rect class="box" y="140" width="220" height="44"/><text x="110" y="168" text-anchor="middle">userLogin.jsp 返却</text>
  </g>
  <g transform="translate(60,670)">
    <rect class="box" width="220" height="44"/><text x="110" y="28" text-anchor="middle">ProductService.getProducts</text>
    <rect class="db" y="70" width="220" height="44"/><text x="110" y="98" text-anchor="middle">PRODUCT 一覧取得</text>
    <rect class="box" y="140" width="220" height="44"/><text x="110" y="168" text-anchor="middle">index.jsp 返却</text>
  </g>
  <path class="line" d="M440 124 L440 150"/><path class="line" d="M440 194 L440 220"/><path class="line" d="M440 264 L440 290"/><path class="line" d="M440 334 L440 430"/>
  <path class="line" d="M580 472 L695 472"/><text x="612" y="462" class="label">No</text>
  <path class="line" d="M440 514 L440 550"/><text x="455" y="536" class="label">Yes</text>
  <path class="line" d="M580 592 L695 592"/><text x="612" y="582" class="label">No</text>
  <path class="line" d="M440 634 L440 670"/><text x="455" y="656" class="label">Yes</text>
  <path class="line" d="M695 474 L695 500"/><path class="line" d="M695 614 L695 640"/>
  <path class="line" d="M440 704 C440 730 290 692 280 692"/>
  <path class="line" d="M170 714 L170 740"/><path class="line" d="M170 784 L170 810"/>
</svg>
