<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" role="img" aria-labelledby="title desc">
  <title id="title">エンティティ関係クラス図</title>
  <desc id="desc">User、Category、Product、Cart、CartProduct の関係</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: "Noto Sans JP", "Yu Gothic", Arial, sans-serif; fill: #172033; }
      .title { font-size: 24px; font-weight: 700; }
      .class { fill: #ffffff; stroke: #2563eb; stroke-width: 1.5; rx: 6; }
      .head { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
      .name { font-size: 17px; font-weight: 700; }
      .field { font-size: 14px; }
      .line { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .rel { font-size: 13px; fill: #475569; }
    </style>
  </defs>
  <rect width="980" height="720" fill="#ffffff"/>
  <text x="490" y="42" text-anchor="middle" class="title">エンティティ関係クラス図</text>

  <g transform="translate(70,90)">
    <rect class="class" width="210" height="190"/>
    <rect class="head" width="210" height="38"/>
    <text x="105" y="25" text-anchor="middle" class="name">User</text>
    <text x="18" y="64" class="field">+ int id</text>
    <text x="18" y="88" class="field">+ String username</text>
    <text x="18" y="112" class="field">+ String email</text>
    <text x="18" y="136" class="field">+ String password</text>
    <text x="18" y="160" class="field">+ String role</text>
    <text x="18" y="184" class="field">+ String address</text>
  </g>

  <g transform="translate(385,90)">
    <rect class="class" width="210" height="94"/>
    <rect class="head" width="210" height="38"/>
    <text x="105" y="25" text-anchor="middle" class="name">Category</text>
    <text x="18" y="64" class="field">+ int id</text>
    <text x="18" y="88" class="field">+ String name</text>
  </g>

  <g transform="translate(385,280)">
    <rect class="class" width="230" height="246"/>
    <rect class="head" width="230" height="38"/>
    <text x="115" y="25" text-anchor="middle" class="name">Product</text>
    <text x="18" y="64" class="field">+ int id</text>
    <text x="18" y="88" class="field">+ String name</text>
    <text x="18" y="112" class="field">+ String image</text>
    <text x="18" y="136" class="field">+ int quantity</text>
    <text x="18" y="160" class="field">+ int price</text>
    <text x="18" y="184" class="field">+ int weight</text>
    <text x="18" y="208" class="field">+ Category category</text>
    <text x="18" y="232" class="field">+ User customer</text>
  </g>

  <g transform="translate(70,380)">
    <rect class="class" width="210" height="118"/>
    <rect class="head" width="210" height="38"/>
    <text x="105" y="25" text-anchor="middle" class="name">Cart</text>
    <text x="18" y="64" class="field">+ int id</text>
    <text x="18" y="88" class="field">+ User customer</text>
  </g>

  <g transform="translate(700,380)">
    <rect class="class" width="210" height="142"/>
    <rect class="head" width="210" height="38"/>
    <text x="105" y="25" text-anchor="middle" class="name">CartProduct</text>
    <text x="18" y="64" class="field">+ int id</text>
    <text x="18" y="88" class="field">+ Cart cart</text>
    <text x="18" y="112" class="field">+ Product product</text>
  </g>

  <path class="line" d="M175 280 L175 380"/>
  <text x="188" y="332" class="rel">1 owns 0..*</text>
  <path class="line" d="M280 190 C350 220 350 340 385 390"/>
  <text x="292" y="286" class="rel">1 may_register 0..*</text>
  <path class="line" d="M490 184 L490 280"/>
  <text x="502" y="238" class="rel">1 classifies 0..*</text>
  <path class="line" d="M280 440 L700 440"/>
  <text x="430" y="430" class="rel">1 contains 0..*</text>
  <path class="line" d="M615 450 L700 450"/>
  <text x="624" y="476" class="rel">1 selected_in 0..*</text>
</svg>
