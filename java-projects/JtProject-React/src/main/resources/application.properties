spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp

# Local H2 database for the React edition
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.show_sql=true
hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/jtproject-react;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.file.name=logs/jtproject-react.log
logging.level.root=INFO
logging.level.com.jtspringproject=INFO

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

management.metrics.web.server.request.autotime.enabled=false

server.port=8083

spring.profiles.active=default
