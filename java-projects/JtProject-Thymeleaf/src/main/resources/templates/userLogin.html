<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('用户登录')"></head>
<body>
  <main class="shell">
    <section th:replace="fragments/layout :: hero('用户登录', '这是 Thymeleaf 版本的登录入口，表单提交后仍走原来的 Controller -> Service -> DAO 链路。', 'Spring Boot + Thymeleaf')"></section>
    <nav th:replace="fragments/layout :: userNav('login')"></nav>
    <div th:replace="fragments/layout :: message(${msg}, 'error')"></div>

    <section class="grid two">
      <article class="panel stack">
        <h2>登录表单</h2>
        <p class="muted">可以先观察 `th:action`，再去看 [UserController.java](../../java/com/jtspringproject/JtSpringProject/controller/UserController.java) 的 `userloginAlias` 方法。</p>
        <form th:action="@{/userloginvalidate}" method="post" class="stack">
          <div class="field">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" placeholder="例如 lisa" required>
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" placeholder="例如 765" required>
          </div>
          <div class="actions">
            <button type="submit">登录</button>
            <a class="button secondary" th:href="@{/register}">去注册</a>
          </div>
        </form>
      </article>

      <article class="panel stack">
        <h2>学习点</h2>
        <div class="card">
          <h3>`th:action`</h3>
          <p class="muted">让表单 action 使用 Spring MVC 路由，而不是写死字符串。</p>
        </div>
        <div class="card">
          <h3>`th:if`</h3>
          <p class="muted">上方消息框只在 `msg` 存在时渲染。</p>
        </div>
        <div class="card">
          <h3>`th:href`</h3>
          <p class="muted">导航和注册链接都由 Thymeleaf 生成。</p>
        </div>
        <div class="notice success">
          默认用户：`lisa / 765`
        </div>
      </article>
    </section>
  </main>
</body>
</html>
