spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Local H2 database for the Thymeleaf edition
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.show_sql=true
hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/jtproject-thymeleaf;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Logging Configuration =====
logging.file.name=logs/jtproject-thymeleaf.log
logging.level.root=INFO
logging.level.com.jtspringproject=INFO
logging.level.org.hibernate.SQL=INFO

# Spring Data SQL Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Updated metrics configuration
management.metrics.web.server.request.autotime.enabled=false

# ===== Server Port =====
server.port=8085

# Explicitly Set Active Profile
spring.profiles.active=default
