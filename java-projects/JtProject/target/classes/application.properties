spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp

# ===== MySQL Configuration =====
# spring.datasource.url=jdbc:mysql://192.168.10.2:3306/ecommjava?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.url=jdbc:mysql://192.168.10.2:3306/ecommjava?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Logging Configuration =====
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.jtspringproject=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.type=TRACE
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG

# Spring Data SQL Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Updated metrics configuration
management.metrics.web.server.request.autotime.enabled=false

# ===== Server Port =====
server.port=8082

# Explicitly Set Active Profile
spring.profiles.active=default
