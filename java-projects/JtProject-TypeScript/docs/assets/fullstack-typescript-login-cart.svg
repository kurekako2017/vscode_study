<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">TypeScript 登录和购物车流程</title>
  <desc id="desc">用户登录后获得会话信息，前端再请求购物车并更新页面状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1080" height="500" fill="#ffffff"/>
  <text x="40" y="44" class="title">登录和购物车流程</text>
  <rect x="50" y="100" width="170" height="88" class="box"/><text x="78" y="129" class="txt">User</text><text x="78" y="151" class="sub">提交 lisa / 765</text><text x="78" y="173" class="sub">角色：普通用户</text>
  <rect x="260" y="100" width="210" height="88" class="box"/><text x="288" y="129" class="txt">App.tsx</text><text x="288" y="151" class="sub">submitUserLogin</text><text x="288" y="173" class="sub">分层：React 页面层</text>
  <rect x="510" y="100" width="210" height="88" class="box"/><text x="538" y="129" class="txt">api.ts</text><text x="538" y="151" class="sub">POST /api/auth/login</text><text x="538" y="173" class="sub">分层：前端 API Service</text>
  <rect x="760" y="100" width="235" height="88" class="box"/><text x="788" y="129" class="txt">server.ts</text><text x="788" y="151" class="sub">调用 store.checkLogin</text><text x="788" y="173" class="sub">分层：Controller</text>
  <rect x="760" y="250" width="235" height="88" class="box"/><text x="788" y="279" class="txt">Store</text><text x="788" y="301" class="sub">类名：Store；数据层</text><text x="788" y="323" class="sub">方法：checkLogin</text>
  <rect x="510" y="250" width="210" height="88" class="box"/><text x="538" y="279" class="txt">Session data</text><text x="538" y="301" class="sub">类型：SessionInfo</text><text x="538" y="323" class="sub">文件：shared/index.ts</text>
  <rect x="260" y="250" width="210" height="88" class="box"/><text x="288" y="279" class="txt">Cart API</text><text x="288" y="301" class="sub">server.ts 路由</text><text x="288" y="323" class="sub">Store.getCartProducts</text>
  <rect x="510" y="390" width="290" height="62" class="box"/><text x="538" y="417" class="txt">setCart 后更新购物车 UI</text><text x="538" y="439" class="sub">文件：App.tsx；前端状态层</text>
  <path d="M 220 144 L 260 144" class="arrow"/><path d="M 470 144 L 510 144" class="arrow"/><path d="M 720 144 L 760 144" class="arrow"/>
  <path d="M 878 188 L 878 250" class="arrow"/><path d="M 760 294 L 720 294" class="arrow"/><path d="M 510 294 L 470 294" class="arrow"/>
  <path d="M 365 338 L 560 390" class="arrow"/>
</svg>
