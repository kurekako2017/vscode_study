<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">TypeScript 登录和购物车流程</title>
  <desc id="desc">用户登录后获得会话信息，前端再请求购物车并更新页面状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="980" height="420" fill="#ffffff"/>
  <text x="40" y="44" class="title">登录和购物车流程</text>
  <rect x="50" y="100" width="170" height="65" class="box"/><text x="78" y="129" class="txt">User</text><text x="78" y="151" class="sub">提交 lisa / 765</text>
  <rect x="265" y="100" width="190" height="65" class="box"/><text x="293" y="129" class="txt">App.tsx</text><text x="293" y="151" class="sub">登录表单</text>
  <rect x="500" y="100" width="180" height="65" class="box"/><text x="528" y="129" class="txt">api.ts</text><text x="528" y="151" class="sub">auth login</text>
  <rect x="725" y="100" width="190" height="65" class="box"/><text x="753" y="129" class="txt">server.ts</text><text x="753" y="151" class="sub">checkLogin</text>
  <rect x="500" y="245" width="180" height="65" class="box"/><text x="528" y="274" class="txt">Session data</text><text x="528" y="296" class="sub">setSession</text>
  <rect x="265" y="245" width="190" height="65" class="box"/><text x="293" y="274" class="txt">Cart API</text><text x="293" y="296" class="sub">getCartProducts</text>
  <rect x="500" y="345" width="220" height="50" class="box"/><text x="528" y="377" class="txt">setCart 后更新购物车 UI</text>
  <path d="M 220 133 L 265 133" class="arrow"/><path d="M 455 133 L 500 133" class="arrow"/><path d="M 680 133 L 725 133" class="arrow"/>
  <path d="M 820 165 L 820 215 L 590 215 L 590 245" class="arrow"/><path d="M 500 278 L 455 278" class="arrow"/>
  <path d="M 360 310 L 550 345" class="arrow"/>
</svg>
