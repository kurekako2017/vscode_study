<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">纯 TypeScript 全栈整体流程</title>
  <desc id="desc">React TypeScript 前端通过统一 API 函数调用 Express TypeScript 后端，后端访问内存数据并返回 JSON，前端更新状态。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .db { fill: #fefce8; stroke: #92400e; stroke-width: 2; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1180" height="620" fill="#ffffff"/>
  <text x="48" y="44" class="title">纯 TypeScript 全栈整体流程</text>

  <rect x="50" y="85" width="210" height="70" class="box"/>
  <text x="78" y="115" class="txt">Browser</text>
  <text x="78" y="138" class="sub">访问 localhost:5175</text>

  <rect x="310" y="85" width="230" height="70" class="box"/>
  <text x="338" y="115" class="txt">React TypeScript</text>
  <text x="338" y="138" class="sub">Vite 前端应用</text>

  <rect x="590" y="85" width="240" height="70" class="box"/>
  <text x="618" y="115" class="txt">api.ts</text>
  <text x="618" y="138" class="sub">统一 fetch 请求封装</text>

  <rect x="880" y="85" width="240" height="70" class="box"/>
  <text x="908" y="115" class="txt">Express API</text>
  <text x="908" y="138" class="sub">localhost:8090/api</text>

  <rect x="720" y="235" width="240" height="70" class="box"/>
  <text x="748" y="265" class="txt">server.ts</text>
  <text x="748" y="288" class="sub">路由函数处理请求</text>

  <rect x="430" y="235" width="240" height="70" class="box"/>
  <text x="458" y="265" class="txt">Store</text>
  <text x="458" y="288" class="sub">内存数据仓库</text>

  <ellipse cx="220" cy="270" rx="125" ry="38" class="db"/>
  <text x="148" y="266" class="txt">Seed Data</text>
  <text x="136" y="289" class="sub">products / users / cart</text>

  <rect x="430" y="405" width="240" height="70" class="box"/>
  <text x="458" y="435" class="txt">ApiResult JSON</text>
  <text x="458" y="458" class="sub">统一返回结构</text>

  <rect x="720" y="405" width="240" height="70" class="box"/>
  <text x="748" y="435" class="txt">React State</text>
  <text x="748" y="458" class="sub">products / session / cart</text>

  <rect x="880" y="525" width="240" height="60" class="box"/>
  <text x="908" y="560" class="txt">Rendered UI</text>

  <path d="M 260 120 L 310 120" class="arrow"/>
  <path d="M 540 120 L 590 120" class="arrow"/>
  <path d="M 830 120 L 880 120" class="arrow"/>
  <path d="M 1000 155 L 1000 270 L 960 270" class="arrow"/>
  <path d="M 720 270 L 670 270" class="arrow"/>
  <path d="M 430 270 L 345 270" class="arrow"/>
  <path d="M 550 305 L 550 405" class="arrow"/>
  <path d="M 670 440 L 720 440" class="arrow"/>
  <path d="M 840 475 L 960 525" class="arrow"/>
</svg>
