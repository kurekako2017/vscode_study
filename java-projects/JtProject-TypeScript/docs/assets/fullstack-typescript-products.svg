<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">TypeScript 商品列表加载流程</title>
  <desc id="desc">React 页面加载时调用 products API，Express 从 Store 读取商品并返回，页面更新商品列表。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1080" height="470" fill="#ffffff"/>
  <text x="40" y="44" class="title">商品列表加载流程</text>
  <rect x="50" y="105" width="180" height="88" class="box"/><text x="78" y="134" class="txt">Browser</text><text x="78" y="156" class="sub">打开页面</text><text x="78" y="178" class="sub">分层：客户端</text>
  <rect x="270" y="105" width="210" height="88" class="box"/><text x="298" y="134" class="txt">App.tsx</text><text x="298" y="156" class="sub">loadInitialData</text><text x="298" y="178" class="sub">分层：React 页面层</text>
  <rect x="520" y="105" width="210" height="88" class="box"/><text x="548" y="134" class="txt">api.ts</text><text x="548" y="156" class="sub">GET /api/products</text><text x="548" y="178" class="sub">分层：前端 API Service</text>
  <rect x="770" y="105" width="220" height="88" class="box"/><text x="798" y="134" class="txt">server.ts</text><text x="798" y="156" class="sub">Express 路由</text><text x="798" y="178" class="sub">分层：Controller</text>
  <rect x="380" y="270" width="245" height="88" class="box"/><text x="408" y="299" class="txt">Store</text><text x="408" y="321" class="sub">类名：Store</text><text x="408" y="343" class="sub">方法：getProducts；数据层</text>
  <rect x="680" y="270" width="260" height="88" class="box"/><text x="708" y="299" class="txt">Product list</text><text x="708" y="321" class="sub">类型：Product[]</text><text x="708" y="343" class="sub">文件：shared/index.ts</text>
  <path d="M 230 149 L 270 149" class="arrow"/><path d="M 480 149 L 520 149" class="arrow"/><path d="M 730 149 L 770 149" class="arrow"/>
  <path d="M 880 193 L 880 235 L 502 235 L 502 270" class="arrow"/><path d="M 625 314 L 680 314" class="arrow"/>
</svg>
