<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">TypeScript 商品列表加载流程</title>
  <desc id="desc">React 页面加载时调用 products API，Express 从 Store 读取商品并返回，页面更新商品列表。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .txt { font: 700 15px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #1f2937; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="980" height="420" fill="#ffffff"/>
  <text x="40" y="44" class="title">商品列表加载流程</text>
  <rect x="50" y="105" width="180" height="65" class="box"/><text x="78" y="134" class="txt">Browser</text><text x="78" y="156" class="sub">打开页面</text>
  <rect x="275" y="105" width="190" height="65" class="box"/><text x="303" y="134" class="txt">App.tsx</text><text x="303" y="156" class="sub">loadInitialData</text>
  <rect x="510" y="105" width="180" height="65" class="box"/><text x="538" y="134" class="txt">api.ts</text><text x="538" y="156" class="sub">GET products</text>
  <rect x="735" y="105" width="190" height="65" class="box"/><text x="763" y="134" class="txt">server.ts</text><text x="763" y="156" class="sub">Express 路由</text>
  <rect x="390" y="250" width="200" height="65" class="box"/><text x="418" y="279" class="txt">Store</text><text x="418" y="301" class="sub">getProducts</text>
  <rect x="655" y="250" width="210" height="65" class="box"/><text x="683" y="279" class="txt">Product list</text><text x="683" y="301" class="sub">返回并更新 state</text>
  <path d="M 230 138 L 275 138" class="arrow"/><path d="M 465 138 L 510 138" class="arrow"/><path d="M 690 138 L 735 138" class="arrow"/>
  <path d="M 830 170 L 830 215 L 490 215 L 490 250" class="arrow"/><path d="M 590 283 L 655 283" class="arrow"/>
</svg>
