<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">RunnableParallel 并行链数据流</title>
  <desc id="desc">同一份输入进入多条 Runnable 并行处理，结果以字典形式汇总，再交给下游总结链。</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">RunnableParallel：同一输入，多路并行</text>
  <text x="600" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">不是把代码写在一起，而是把多条子链的结果汇总成一个 dict</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="70" y="215" width="170" height="90" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="155" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">同一输入</text>
  <text x="155" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">question</text>

  <rect x="360" y="135" width="210" height="72" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="465" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#15803d">中文回答链</text>
  <rect x="360" y="224" width="210" height="72" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="465" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#4338ca">英文回答链</text>
  <rect x="360" y="313" width="210" height="72" rx="16" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
  <text x="465" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#be123c">关键词提取链</text>

  <rect x="700" y="190" width="185" height="140" rx="20" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="792" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#c2410c">dict 汇总</text>
  <text x="792" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">chinese</text>
  <text x="792" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">english</text>

  <rect x="985" y="215" width="160" height="90" rx="18" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="1065" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#15803d">下游链</text>
  <text x="1065" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">总结 / 对比</text>

  <line x1="240" y1="260" x2="350" y2="170" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="240" y1="260" x2="350" y2="260" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="240" y1="260" x2="350" y2="350" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="170" x2="690" y2="235" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="260" x2="690" y2="260" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="350" x2="690" y2="285" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="885" y1="260" x2="975" y2="260" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
