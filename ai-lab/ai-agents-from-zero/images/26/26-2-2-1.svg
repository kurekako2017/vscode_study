<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="520" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">Supervisor 执行流程示意</title>
  <desc id="desc">用户提出机票和酒店预订需求，Supervisor 分析需求并调用 flight_assistant 与 hotel_assistant，两个子 Agent 调用工具后返回结果，Supervisor 汇总输出。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263445"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5b6c83"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#19324d" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { stroke: #263445; stroke-width: 2.4; rx: 18; filter: url(#shadow); }
      .label { font: 700 21px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .code { font: 700 17px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #1f2937; text-anchor: middle; }
      .edge { fill: none; stroke: #263445; stroke-width: 3.8; marker-end: url(#arrow); stroke-linecap: round; }
      .edge-soft { fill: none; stroke: #5b6c83; stroke-width: 3; marker-end: url(#arrow-soft); stroke-linecap: round; }
      .lane { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; rx: 24; }
      .tag { fill: #fff8e8; stroke: #e0a13d; stroke-width: 1.5; rx: 12; }
      .tag-text { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #8a4b00; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="520"/>
  <text class="title" x="42" y="48">Supervisor 执行流程</text>
  <text class="subtitle" x="42" y="76">主管 Agent 负责理解需求、拆分任务、调用子 Agent，并把多个子任务结果汇总后返回给用户。</text>

  <rect class="box" x="42" y="208" width="210" height="102" fill="#ffffff"/>
  <text class="label" x="147" y="244">用户输入</text>
  <text class="small" x="147" y="270">订北京 → 深圳机票</text>
  <text class="small" x="147" y="292">并预订酒店</text>

  <path class="edge" d="M 254 259 C 284 259, 305 259, 336 259"/>

  <rect class="box" x="342" y="184" width="226" height="150" fill="#fff0f5"/>
  <text class="label" x="455" y="222">Supervisor</text>
  <text class="small" x="455" y="248">接收请求</text>
  <text class="small" x="455" y="272">分析需求</text>
  <text class="small" x="455" y="296">选择子 Agent</text>

  <rect class="tag" x="584" y="120" width="156" height="36"/>
  <text class="tag-text" x="662" y="143">动态路由决策</text>

  <path class="edge-soft" d="M 568 222 C 620 184, 652 160, 704 148"/>
  <path class="edge-soft" d="M 568 296 C 620 338, 654 362, 704 374"/>
  <text class="small" x="642" y="190">调用机票子 Agent</text>
  <text class="small" x="646" y="350">调用酒店子 Agent</text>

  <rect class="lane" x="704" y="104" width="362" height="146"/>
  <rect class="box" x="732" y="132" width="194" height="82" fill="#eef6ff"/>
  <text class="code" x="829" y="166">flight_assistant</text>
  <text class="small" x="829" y="192">处理机票预订子任务</text>

  <rect class="box" x="970" y="132" width="72" height="82" fill="#edf9ef"/>
  <text class="code" x="1006" y="166">tool</text>
  <text class="small" x="1006" y="192">订机票</text>

  <path class="edge-soft" d="M 928 173 C 942 173, 954 173, 968 173"/>
  <text class="small" x="949" y="159">执行</text>

  <rect class="lane" x="704" y="306" width="362" height="146"/>
  <rect class="box" x="732" y="334" width="194" height="82" fill="#f3efff"/>
  <text class="code" x="829" y="368">hotel_assistant</text>
  <text class="small" x="829" y="394">处理酒店预订子任务</text>

  <rect class="box" x="970" y="334" width="72" height="82" fill="#edf9ef"/>
  <text class="code" x="1006" y="368">tool</text>
  <text class="small" x="1006" y="394">订酒店</text>

  <path class="edge-soft" d="M 928 375 C 942 375, 954 375, 968 375"/>
  <text class="small" x="949" y="361">执行</text>

  <rect class="box" x="1094" y="214" width="176" height="116" fill="#edf9ef"/>
  <text class="label" x="1182" y="252">Supervisor 汇总</text>
  <text class="small" x="1182" y="278">整合机票结果</text>
  <text class="small" x="1182" y="300">与酒店结果</text>

  <path class="edge-soft" d="M 1044 173 C 1082 190, 1106 206, 1128 232"/>
  <path class="edge-soft" d="M 1044 375 C 1082 356, 1106 336, 1128 310"/>
  <text class="small" x="1096" y="196">返回结果</text>
  <text class="small" x="1096" y="356">返回结果</text>

  <path class="edge" d="M 1182 332 C 1182 356, 1182 374, 1182 397"/>

  <rect class="box" x="1072" y="400" width="220" height="72" fill="#ffffff"/>
  <text class="label" x="1182" y="432">输出最终信息</text>
  <text class="small" x="1182" y="456">返回给用户</text>
</svg>
