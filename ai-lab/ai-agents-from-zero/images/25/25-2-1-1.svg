<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint 持久化概念图</title>
  <desc id="desc">LangGraph 运行时按 thread_id 组织执行链路，在每个关键步骤写入 checkpoint，支持失败恢复、暂停与恢复、时间旅行和审计追踪。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263445"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#19324d" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f7ff"/>
      <stop offset="100%" stop-color="#f3efff"/>
    </linearGradient>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { stroke: #263445; stroke-width: 2.4; rx: 18; filter: url(#shadow); }
      .soft { stroke: #d8dee8; stroke-width: 2; rx: 24; fill: #ffffff; }
      .label { font: 700 21px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .code { font: 700 16px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #1f2937; text-anchor: middle; }
      .edge { fill: none; stroke: #263445; stroke-width: 3.6; marker-end: url(#arrow); stroke-linecap: round; }
      .edge-soft { fill: none; stroke: #5b6c83; stroke-width: 2.8; marker-end: url(#arrow); stroke-linecap: round; }
      .dash { fill: none; stroke: #5b6c83; stroke-width: 2.6; stroke-dasharray: 8 8; marker-end: url(#arrow); stroke-linecap: round; }
      .pill { fill: #fff8e8; stroke: #e0a13d; stroke-width: 1.5; rx: 16; }
      .pill-text { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #8a4b00; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="560"/>
  <text class="title" x="42" y="48">Checkpoint 持久化：让图的状态可恢复、可回溯、可审计</text>
  <text class="subtitle" x="42" y="76">配置 checkpointer 后，LangGraph 会把每一步状态保存为检查点，并按 thread_id 归并到同一条会话或任务链路下。</text>

  <rect class="box" x="48" y="188" width="220" height="96" fill="#ffffff"/>
  <text class="label" x="158" y="225">调用图</text>
  <text class="code" x="158" y="252">graph.invoke(...)</text>
  <text class="small" x="158" y="274">携带 thread_id</text>

  <path class="edge" d="M 270 236 C 294 236, 312 236, 336 236"/>

  <rect class="box" x="342" y="166" width="236" height="140" fill="#fff8e8"/>
  <text class="label" x="460" y="204">运行时执行</text>
  <text class="small" x="460" y="231">节点依次读写 State</text>
  <text class="small" x="460" y="255">Reducer 负责合并更新</text>
  <text class="small" x="460" y="279">每个关键步骤自动存档</text>

  <path class="edge" d="M 580 236 C 604 236, 620 236, 644 236"/>

  <rect class="soft" x="650" y="128" width="300" height="216"/>
  <text class="label" x="800" y="164">执行时间线</text>
  <text class="small" x="800" y="188">同一 thread 下的一串状态快照</text>

  <circle cx="710" cy="244" r="18" fill="#eef6ff" stroke="#263445" stroke-width="2.2"/>
  <circle cx="800" cy="244" r="18" fill="#f3efff" stroke="#263445" stroke-width="2.2"/>
  <circle cx="890" cy="244" r="18" fill="#edf9ef" stroke="#263445" stroke-width="2.2"/>
  <path class="edge-soft" d="M 730 244 C 748 244, 762 244, 780 244"/>
  <path class="edge-soft" d="M 820 244 C 838 244, 852 244, 870 244"/>
  <text class="code" x="710" y="291">ckpt_1</text>
  <text class="code" x="800" y="291">ckpt_2</text>
  <text class="code" x="890" y="291">ckpt_3</text>

  <path class="edge" d="M 952 236 C 978 236, 996 236, 1022 236"/>

  <rect class="box" x="1028" y="148" width="204" height="176" fill="url(#store)"/>
  <ellipse cx="1130" cy="170" rx="70" ry="20" fill="#ffffff" stroke="#263445" stroke-width="2.2"/>
  <path d="M1060 170 L1060 282 C1060 293 1091 304 1130 304 C1169 304 1200 293 1200 282 L1200 170" fill="none" stroke="#263445" stroke-width="2.2"/>
  <ellipse cx="1130" cy="282" rx="70" ry="22" fill="#ffffff" stroke="#263445" stroke-width="2.2"/>
  <text class="label" x="1130" y="228">Checkpoint</text>
  <text class="label" x="1130" y="255">Store</text>

  <rect class="pill" x="1042" y="334" width="176" height="38"/>
  <text class="pill-text" x="1130" y="359">thread_id 组织检查点</text>

  <path class="dash" d="M 1130 374 C 1130 404, 1130 422, 1130 450"/>

  <rect class="box" x="66" y="420" width="236" height="86" fill="#edf9ef"/>
  <text class="label" x="184" y="454">失败恢复</text>
  <text class="small" x="184" y="480">从最近 checkpoint 继续</text>

  <rect class="box" x="354" y="420" width="236" height="86" fill="#eef6ff"/>
  <text class="label" x="472" y="454">暂停与恢复</text>
  <text class="small" x="472" y="480">等待人类确认后再跑</text>

  <rect class="box" x="642" y="420" width="236" height="86" fill="#f3efff"/>
  <text class="label" x="760" y="454">时间旅行</text>
  <text class="small" x="760" y="480">回到任意历史状态分叉</text>

  <rect class="box" x="930" y="420" width="236" height="86" fill="#fff8e8"/>
  <text class="label" x="1048" y="454">审计追踪</text>
  <text class="small" x="1048" y="480">查看每一步状态变化</text>

  <path class="dash" d="M 1058 450 C 994 382, 902 338, 816 294"/>
  <path class="dash" d="M 760 420 C 780 380, 792 342, 798 296"/>
  <path class="dash" d="M 472 420 C 526 360, 604 322, 710 292"/>
  <path class="dash" d="M 184 420 C 288 350, 442 322, 710 292"/>
</svg>
