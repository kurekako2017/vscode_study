<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="420" viewBox="0 0 1320 420" role="img" aria-labelledby="title desc">
  <title id="title">多智能体协作模式图</title>
  <desc id="desc">展示分层规划与共创协作两种多智能体协作模式。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#27313f"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5b6c83"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#19324d" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; rx: 22; }
      .title { font: 700 25px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #18212f; }
      .subtitle { font: 400 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { stroke: #263445; stroke-width: 2.4; rx: 16; filter: url(#shadow); }
      .role { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .edge { fill: none; stroke: #27313f; stroke-width: 3.6; marker-end: url(#arrow); stroke-linecap: round; }
      .edge-soft { fill: none; stroke: #5b6c83; stroke-width: 3; marker-end: url(#arrow-soft); stroke-linecap: round; }
      .edge-dashed { fill: none; stroke: #5b6c83; stroke-width: 2.8; stroke-dasharray: 9 9; marker-end: url(#arrow-soft); stroke-linecap: round; }
      .tag { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475467; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="420"/>
  <text class="title" x="42" y="46">多智能体协作：分层规划与共创协作</text>
  <text class="subtitle" x="42" y="73">复杂任务通常不是一个 Agent 从头做到尾，而是由多个角色分工、汇报、互相补充，像一个可编排的团队。</text>

  <rect class="panel" x="38" y="102" width="612" height="276"/>
  <text class="title" x="66" y="139">模式一：分层规划</text>
  <text class="subtitle" x="66" y="163">Leader Agent 拆解任务、分派子任务，并汇总结果。</text>

  <rect class="box" x="70" y="216" width="130" height="74" fill="#fffaf0"/>
  <text class="role" x="135" y="249">顶层任务</text>
  <text class="small" x="135" y="274">撰写课程</text>

  <rect class="box" x="254" y="172" width="150" height="84" fill="#fff0f5"/>
  <text class="role" x="329" y="205">项目主管</text>
  <text class="small" x="329" y="230">Leader Agent</text>

  <rect class="box" x="222" y="292" width="118" height="60" fill="#f7fbff"/>
  <text class="role" x="281" y="318">教学设计师</text>
  <text class="small" x="281" y="340">结构设计</text>

  <rect class="box" x="362" y="292" width="118" height="60" fill="#f7fbff"/>
  <text class="role" x="421" y="318">数据科学家</text>
  <text class="small" x="421" y="340">资料分析</text>

  <rect class="box" x="502" y="292" width="118" height="60" fill="#f7fbff"/>
  <text class="role" x="561" y="318">内容编写者</text>
  <text class="small" x="561" y="340">文本成稿</text>

  <rect class="box" x="480" y="178" width="126" height="72" fill="#edf9ef"/>
  <text class="role" x="543" y="210">最终汇总</text>
  <text class="small" x="543" y="234">完整课程</text>

  <path class="edge" d="M 202 253 C 220 244, 234 235, 252 225"/>
  <path class="edge" d="M 405 214 C 430 213, 450 212, 478 211"/>
  <path class="edge-soft" d="M 304 255 C 294 269, 289 278, 283 290"/>
  <path class="edge-soft" d="M 346 255 C 367 272, 386 282, 407 291"/>
  <path class="edge-soft" d="M 382 255 C 429 279, 469 290, 500 310"/>
  <path class="edge-dashed" d="M 284 292 C 300 276, 310 264, 321 257"/>
  <path class="edge-dashed" d="M 421 292 C 399 274, 376 263, 353 256"/>
  <path class="edge-dashed" d="M 560 292 C 515 268, 457 246, 405 225"/>
  <text class="tag" x="252" y="281">分派</text>
  <text class="tag" x="381" y="281">汇报</text>

  <rect class="panel" x="690" y="102" width="592" height="276"/>
  <text class="title" x="718" y="139">模式二：共创协作</text>
  <text class="subtitle" x="718" y="163">多个 Agent 共享上下文，互相补充、校验和改写。</text>

  <rect class="box" x="732" y="216" width="124" height="74" fill="#fffaf0"/>
  <text class="role" x="794" y="249">复杂任务</text>
  <text class="small" x="794" y="274">选题 / 大纲</text>

  <rect class="box" x="926" y="170" width="128" height="68" fill="#eef6ff"/>
  <text class="role" x="990" y="198">检索 Agent</text>
  <text class="small" x="990" y="221">查资料</text>

  <rect class="box" x="880" y="288" width="128" height="68" fill="#f3efff"/>
  <text class="role" x="944" y="316">写作 Agent</text>
  <text class="small" x="944" y="339">组织表达</text>

  <rect class="box" x="1060" y="288" width="128" height="68" fill="#fff3e8"/>
  <text class="role" x="1124" y="316">评审 Agent</text>
  <text class="small" x="1124" y="339">检查质量</text>

  <rect class="box" x="1126" y="184" width="120" height="74" fill="#edf9ef"/>
  <text class="role" x="1186" y="216">共同产出</text>
  <text class="small" x="1186" y="241">可用版本</text>

  <path class="edge" d="M 858 253 C 886 234, 901 220, 924 206"/>
  <path class="edge" d="M 858 263 C 884 282, 895 296, 915 309"/>
  <path class="edge-soft" d="M 997 239 C 988 258, 975 274, 960 288"/>
  <path class="edge-soft" d="M 1010 235 C 1047 258, 1083 277, 1110 289"/>
  <path class="edge-soft" d="M 1128 288 C 1144 272, 1157 260, 1172 248"/>
  <path class="edge-dashed" d="M 1120 289 C 1080 258, 1040 239, 1002 238"/>
  <path class="edge-dashed" d="M 943 288 C 988 264, 1042 258, 1090 292"/>
  <path class="edge" d="M 1055 203 C 1080 205, 1101 209, 1124 214"/>
  <text class="tag" x="1034" y="272">共享上下文</text>
  <text class="tag" x="1078" y="246">互相校验</text>
</svg>
