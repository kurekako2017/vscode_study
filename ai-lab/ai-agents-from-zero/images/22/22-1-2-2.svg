<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">人机协作 HITL 流程图</title>
  <desc id="desc">课程内容经过 AI 分析师、AI 改写器、人类专家审核，最终形成版本。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#27313f"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7a4b00"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { stroke: #243244; stroke-width: 2.5; rx: 18; filter: url(#shadow); }
      .label { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .note { font: 500 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .edge { fill: none; stroke: #27313f; stroke-width: 4; marker-end: url(#arrow); stroke-linecap: round; }
      .edge-dashed { fill: none; stroke: #9a5b00; stroke-width: 3.5; stroke-dasharray: 10 10; marker-end: url(#arrow-dashed); stroke-linecap: round; }
      .tag { fill: #fff8e8; stroke: #e0a13d; stroke-width: 1.6; rx: 14; }
      .tag-text { font: 700 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #8a4b00; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="360"/>
  <text class="title" x="46" y="48">人机协作（Human-in-the-loop）</text>
  <text class="subtitle" x="46" y="76">AI 负责分析与改写，人类专家在不确定或高风险节点介入审核，让自动化流程保持可控。</text>

  <rect class="box" x="42" y="136" width="170" height="94" fill="#ffffff"/>
  <text class="label" x="127" y="174">课程内容</text>
  <text class="note" x="127" y="202">原始材料 / 草稿</text>

  <path class="edge" d="M 214 183 C 246 183, 258 183, 289 183"/>

  <rect class="box" x="292" y="126" width="210" height="114" fill="#eef6ff"/>
  <text class="label" x="397" y="170">AI 分析师</text>
  <text class="note" x="397" y="201">发现问题，给出建议</text>

  <path class="edge" d="M 504 183 C 534 183, 548 183, 579 183"/>

  <rect class="box" x="582" y="126" width="210" height="114" fill="#f3efff"/>
  <text class="label" x="687" y="170">AI 改写器</text>
  <text class="note" x="687" y="201">执行修改，生成新版</text>

  <path class="edge" d="M 794 196 C 847 219, 877 238, 935 258"/>

  <rect class="box" x="956" y="222" width="204" height="88" fill="#edf9ef"/>
  <text class="label" x="1058" y="258">最终版本</text>
  <text class="note" x="1058" y="286">可发布 / 可交付</text>

  <rect class="tag" x="825" y="72" width="126" height="42"/>
  <text class="tag-text" x="888" y="99">不确定时</text>

  <path class="edge-dashed" d="M 792 154 C 848 104, 910 92, 979 102"/>

  <rect class="box" x="1000" y="74" width="218" height="102" fill="#fff0f0"/>
  <text class="label" x="1109" y="116">人类专家</text>
  <text class="note" x="1109" y="147">审核、判断、决策</text>

  <path class="edge-dashed" d="M 1000 151 C 927 188, 870 192, 794 181"/>

  <text class="note" x="905" y="207">通过审核后继续执行</text>
</svg>
