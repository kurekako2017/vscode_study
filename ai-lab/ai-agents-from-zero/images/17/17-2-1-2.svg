<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">bind_tools 与 Agent 自动执行工具的边界</title>
  <desc id="desc">bind_tools 只是把工具定义交给模型，程序或 Agent 负责真正执行工具并把结果交回模型。</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Tool Calling 的边界：绑定不等于执行</text>
  <text x="600" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#475569">模型提出工具调用意图，程序或 Agent 才负责真正执行工具</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="55" y="135" width="520" height="295" rx="24" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="315" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">bind_tools 路线</text>
  <text x="315" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">只把工具 schema 给模型看</text>

  <rect x="95" y="250" width="120" height="58" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="155" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">工具定义</text>
  <rect x="255" y="250" width="120" height="58" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="315" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">模型判断</text>
  <rect x="415" y="250" width="120" height="58" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="475" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">tool_calls</text>
  <line x1="215" y1="279" x2="245" y2="279" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="375" y1="279" x2="405" y2="279" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="315" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#be123c">不会自动调用外部 API</text>

  <rect x="625" y="135" width="520" height="295" rx="24" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
  <text x="885" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15803d">Agent 路线</text>
  <text x="885" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">负责循环、执行工具、写回观察结果</text>

  <rect x="665" y="250" width="105" height="58" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="717" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">用户问题</text>
  <rect x="805" y="250" width="105" height="58" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="857" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">Agent</text>
  <rect x="945" y="250" width="105" height="58" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="997" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">工具执行</text>
  <line x1="770" y1="279" x2="795" y2="279" stroke="#16a34a" stroke-width="4" marker-end="url(#greenArrow)"/>
  <line x1="910" y1="279" x2="935" y2="279" stroke="#16a34a" stroke-width="4" marker-end="url(#greenArrow)"/>
  <path d="M997 310 C997 370 855 370 855 315" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#greenArrow)"/>
  <text x="885" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#15803d">工具结果会回到模型上下文</text>
</svg>
