<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">从长 Prompt 到 Skill 化</title>
  <desc id="desc">把反复出现的规则、流程、模板和脚本从主提示词中拆出来，整理成可复用的技能包。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="560" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">把“反复说的话”整理成可复用 Skill</text>
  <text x="560" y="86" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#475569">主 Prompt 负责目标和身份，Skill 负责具体任务方法、模板、脚本和参考资料</text>

  <g filter="url(#shadow)">
    <rect x="70" y="130" width="340" height="270" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="240" y="168" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#0f172a">长 Prompt</text>
    <text x="105" y="212" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">你是代码审查专家</text>
    <text x="105" y="246" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">要检查安全、性能、边界条件</text>
    <text x="105" y="280" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">要按表格输出</text>
    <text x="105" y="314" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">要参考团队规范和模板</text>
    <text x="105" y="348" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">必要时运行检查脚本</text>
  </g>

  <path d="M440 265 H650" stroke="#4b5563" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="545" y="238" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#334155">拆出来</text>
  <text x="545" y="292" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">整理、命名、按需加载</text>

  <g filter="url(#shadow)">
    <rect x="690" y="120" width="360" height="290" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="870" y="158" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#0f172a">Skill 包</text>

    <rect x="730" y="190" width="280" height="44" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="870" y="218" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#075985">SKILL.md：触发边界 + 执行步骤</text>

    <rect x="730" y="252" width="280" height="44" rx="10" fill="#ecfdf5" stroke="#34d399"/>
    <text x="870" y="280" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#065f46">references：规范、模板、示例</text>

    <rect x="730" y="314" width="280" height="44" rx="10" fill="#fff7ed" stroke="#fb923c"/>
    <text x="870" y="342" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#9a3412">scripts / assets：脚本和资源</text>
  </g>

  <rect x="290" y="440" width="540" height="44" rx="22" fill="#111827"/>
  <text x="560" y="468" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#ffffff">结果：主 Agent 更轻，专业能力更容易复用和维护</text>
</svg>
