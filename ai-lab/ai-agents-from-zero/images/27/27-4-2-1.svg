<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Skill 渐进式加载三层</title>
  <desc id="desc">Agent 先读取技能元信息，任务匹配后读取完整说明，真正需要时再读取资源或运行脚本。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="560" y="58" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">Skill 的渐进式加载</text>
  <text x="560" y="92" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#475569">先暴露少量信息，再按任务相关性逐步展开详细内容</text>

  <g filter="url(#shadow)">
    <rect x="65" y="165" width="270" height="190" rx="16" fill="#ffffff" stroke="#bae6fd"/>
    <circle cx="200" cy="165" r="28" fill="#0ea5e9"/>
    <text x="200" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1</text>
    <text x="200" y="222" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#0f172a">元信息层</text>
    <text x="200" y="260" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">name</text>
    <text x="200" y="290" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">description</text>
    <text x="200" y="320" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">先让 Agent 知道“我会什么”</text>
  </g>

  <path d="M355 260 H435" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="455" y="165" width="270" height="190" rx="16" fill="#ffffff" stroke="#bbf7d0"/>
    <circle cx="590" cy="165" r="28" fill="#22c55e"/>
    <text x="590" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2</text>
    <text x="590" y="222" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#0f172a">指令层</text>
    <text x="590" y="260" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">完整 SKILL.md</text>
    <text x="590" y="290" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">步骤、边界、输出格式</text>
    <text x="590" y="320" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">任务匹配后再展开细节</text>
  </g>

  <path d="M745 260 H825" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="845" y="165" width="270" height="190" rx="16" fill="#ffffff" stroke="#fed7aa"/>
    <circle cx="980" cy="165" r="28" fill="#f97316"/>
    <text x="980" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">3</text>
    <text x="980" y="222" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#0f172a">资源执行层</text>
    <text x="980" y="260" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">references / scripts / assets</text>
    <text x="980" y="290" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">规范、脚本、模板、样例</text>
    <text x="980" y="320" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">真正需要时才读取或运行</text>
  </g>

  <rect x="260" y="410" width="600" height="48" rx="24" fill="#334155"/>
  <text x="560" y="440" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#ffffff">核心好处：节省上下文，也减少技能过多时的选择混乱</text>
</svg>
