<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Skill 与其他 Agent 能力的边界</title>
  <desc id="desc">Prompt 是临时指令，Rules 是常驻规则，Memory 是历史状态，Tool 执行动作，MCP 统一接入外部能力，Agent 负责决策，Skill 沉淀可复用任务方法。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <text x="560" y="54" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">Skill 不是孤立能力，而是上下文工程的一层</text>
  <text x="560" y="88" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#475569">先分清每一层解决什么问题，再决定该把规则放在哪里</text>

  <g filter="url(#shadow)">
    <rect x="405" y="205" width="310" height="140" rx="20" fill="#111827"/>
    <text x="560" y="260" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#ffffff">Skill</text>
    <text x="560" y="298" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#e5e7eb">可复用任务方法</text>
    <text x="560" y="326" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#cbd5e1">流程、模板、脚本、参考资料</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="145" width="230" height="82" rx="14" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="185" y="180" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#312e81">Prompt</text>
    <text x="185" y="207" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">当前任务的一次性指令</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="330" width="230" height="82" rx="14" fill="#ffffff" stroke="#bae6fd"/>
    <text x="185" y="365" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#075985">Rules</text>
    <text x="185" y="392" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">项目长期规则和偏好</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="445" y="420" width="230" height="82" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="560" y="455" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#166534">Memory</text>
    <text x="560" y="482" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">历史事实、偏好、状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="145" width="230" height="82" rx="14" fill="#ffffff" stroke="#fed7aa"/>
    <text x="935" y="180" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#9a3412">Tool</text>
    <text x="935" y="207" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">执行明确动作</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="330" width="230" height="82" rx="14" fill="#ffffff" stroke="#fecdd3"/>
    <text x="935" y="365" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#9f1239">MCP</text>
    <text x="935" y="392" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">统一接入外部能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="445" y="110" width="230" height="82" rx="14" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="560" y="145" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#6b21a8">Agent</text>
    <text x="560" y="172" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#475569">负责决策、规划和编排</text>
  </g>

  <line x1="300" y1="186" x2="405" y2="245" stroke="#94a3b8" stroke-width="2"/>
  <line x1="300" y1="371" x2="405" y2="305" stroke="#94a3b8" stroke-width="2"/>
  <line x1="560" y1="192" x2="560" y2="205" stroke="#94a3b8" stroke-width="2"/>
  <line x1="560" y1="345" x2="560" y2="420" stroke="#94a3b8" stroke-width="2"/>
  <line x1="715" y1="245" x2="820" y2="186" stroke="#94a3b8" stroke-width="2"/>
  <line x1="715" y1="305" x2="820" y2="371" stroke="#94a3b8" stroke-width="2"/>
</svg>
