<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">StateGraph 输入输出隔离</title>
  <desc id="desc">外部调用经过 input_schema，图内部节点围绕 state_schema 运行，最终通过 output_schema 过滤后返回结果。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263445"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { stroke: #263445; stroke-width: 2.4; rx: 18; filter: url(#shadow); }
      .label { font: 700 21px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #667085; text-anchor: middle; }
      .code { font: 700 18px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #1f2937; text-anchor: middle; }
      .edge { fill: none; stroke: #263445; stroke-width: 3.8; marker-end: url(#arrow); stroke-linecap: round; }
      .lane { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; rx: 22; }
      .tag { fill: #fff8e8; stroke: #e0a13d; stroke-width: 1.6; rx: 12; }
      .tag-text { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #8a4b00; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="420"/>
  <text class="title" x="42" y="48">StateGraph 输入输出隔离</text>
  <text class="subtitle" x="42" y="76">外部接口只暴露输入 / 输出契约，图内部仍围绕完整 state_schema 执行。</text>

  <rect class="box" x="42" y="168" width="220" height="92" fill="#ffffff"/>
  <text class="label" x="152" y="204">外部调用</text>
  <text class="code" x="152" y="235">graph.invoke(...)</text>

  <path class="edge" d="M 264 214 C 276 214, 282 214, 294 214"/>

  <rect class="box" x="300" y="152" width="196" height="124" fill="#fff8e8"/>
  <text class="code" x="398" y="190">input_schema</text>
  <text class="label" x="398" y="223">入口过滤</text>
  <text class="small" x="398" y="250">只允许外部输入字段进图</text>

  <path class="edge" d="M 498 214 C 520 214, 536 214, 558 214"/>

  <rect class="lane" x="562" y="116" width="404" height="196"/>
  <text class="code" x="764" y="150">state_schema</text>
  <text class="small" x="764" y="174">图内部完整状态空间</text>

  <rect class="box" x="594" y="206" width="84" height="54" fill="#eef6ff"/>
  <text class="label" x="636" y="240">START</text>

  <path class="edge" d="M 680 233 C 700 233, 712 233, 732 233"/>

  <rect class="box" x="736" y="196" width="104" height="74" fill="#f3efff"/>
  <text class="label" x="788" y="227">普通节点</text>
  <text class="small" x="788" y="250">读写 State</text>

  <path class="edge" d="M 842 233 C 862 233, 874 233, 894 233"/>

  <rect class="box" x="898" y="206" width="48" height="54" fill="#f4f6f8"/>
  <text class="label" x="922" y="239">...</text>

  <rect class="tag" x="675" y="282" width="178" height="34"/>
  <text class="tag-text" x="764" y="304">内部字段可继续扩展</text>

  <path class="edge" d="M 968 214 C 990 214, 1006 214, 1028 214"/>

  <rect class="box" x="1034" y="152" width="196" height="124" fill="#edf9ef"/>
  <text class="code" x="1132" y="190">output_schema</text>
  <text class="label" x="1132" y="223">出口过滤</text>
  <text class="small" x="1132" y="250">只返回对外约定字段</text>

  <path class="edge" d="M 1132 278 C 1132 302, 1132 318, 1132 340"/>

  <rect class="box" x="1034" y="342" width="196" height="54" fill="#ffffff"/>
  <text class="label" x="1132" y="375">返回结果给调用方</text>
</svg>
