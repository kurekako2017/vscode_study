      .section { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .note { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f766e; }
      .band { stroke-width: 3; rx: 24; }
      .box { fill: #ffffff; stroke-width: 2; rx: 12; filter: drop-shadow(0 3px 8px rgba(15,23,42,0.10)); }
      .smallbox { fill: #ffffff; stroke-width: 2; rx: 10; }
      .blue { stroke: #2563eb; fill: #eff6ff; }
      .green { stroke: #16a34a; fill: #f0fdf4; }
      .orange { stroke: #ea580c; fill: #fff7ed; }
      .purple { stroke: #9333ea; fill: #faf5ff; }
      .slate { stroke: #475569; fill: #f8fafc; }
      .line-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .line-green { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .line-orange { stroke: #ea580c; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
      .line-slate { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow-slate); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1800" height="1520" fill="#f8fafc"/>
  <text x="900" y="44" text-anchor="middle" class="title">shopkeeper-agent-main 目录结构调用流程图</text>
  <text x="900" y="74" text-anchor="middle" class="subtitle">基于“实战项目-电商问数”章节与当前仓库真实代码整理；适合按调用关系找文件学习</text>

  <rect x="30" y="104" width="1740" height="178" class="band blue"/>
  <text x="58" y="142" class="section">A. 在线查询链路：前端 -> FastAPI -> QueryService -> LangGraph -> Repository -> 数据库</text>

  <rect x="60" y="172" width="230" height="78" class="box" stroke="#2563eb"/>
  <text x="175" y="198" text-anchor="middle" class="box-title">frontend/src/App.tsx</text>
  <text x="175" y="220" text-anchor="middle" class="box-text">聊天状态 / 步骤状态 / 结果展示</text>
  <text x="175" y="239" text-anchor="middle" class="tiny">调用 streamQuery(query)</text>

  <rect x="340" y="172" width="210" height="78" class="box" stroke="#2563eb"/>
  <text x="445" y="198" text-anchor="middle" class="box-title">frontend/src/lib/agentApi.ts</text>
  <text x="445" y="220" text-anchor="middle" class="box-text">fetch("/api/query")</text>
  <text x="445" y="239" text-anchor="middle" class="tiny">解析 text/event-stream</text>

  <rect x="610" y="172" width="190" height="78" class="box" stroke="#2563eb"/>
  <text x="705" y="198" text-anchor="middle" class="box-title">main.py</text>
  <text x="705" y="220" text-anchor="middle" class="box-text">FastAPI 应用入口</text>
  <text x="705" y="239" text-anchor="middle" class="tiny">挂载 router / lifespan</text>

  <rect x="850" y="172" width="220" height="78" class="box" stroke="#2563eb"/>
  <text x="960" y="198" text-anchor="middle" class="box-title">app/api/routers/query_router.py</text>
  <text x="960" y="220" text-anchor="middle" class="box-text">POST /api/query</text>
  <text x="960" y="239" text-anchor="middle" class="tiny">StreamingResponse</text>

  <rect x="1120" y="172" width="240" height="78" class="box" stroke="#2563eb"/>
  <text x="1240" y="198" text-anchor="middle" class="box-title">app/api/dependencies.py</text>
  <text x="1240" y="220" text-anchor="middle" class="box-text">组装 Session / Repository / Service</text>
  <text x="1240" y="239" text-anchor="middle" class="tiny">FastAPI Depends</text>

  <rect x="1410" y="172" width="300" height="78" class="box" stroke="#2563eb"/>
  <text x="1560" y="198" text-anchor="middle" class="box-title">app/services/query_service.py</text>
  <text x="1560" y="220" text-anchor="middle" class="box-text">创建 DataAgentState / DataAgentContext</text>
  <text x="1560" y="239" text-anchor="middle" class="tiny">graph.astream(...) -> SSE data: ...</text>

  <path class="line-blue" d="M 290 211 L 340 211"/>
  <path class="line-blue" d="M 550 211 L 610 211"/>
  <path class="line-blue" d="M 800 211 L 850 211"/>
  <path class="line-blue" d="M 1070 211 L 1120 211"/>
  <path class="line-blue" d="M 1360 211 L 1410 211"/>

  <rect x="30" y="310" width="1740" height="650" class="band purple"/>
  <text x="58" y="348" class="section">B. LangGraph 核心工作流：app/agent/graph.py + app/agent/nodes/*.py</text>
  <text x="58" y="372" class="tiny">先读 graph.py，再按箭头顺序读节点；看不懂节点数据来源时，顺着虚线跳到下方 Repository / Config / Prompt</text>

  <rect x="72" y="412" width="190" height="72" class="box" stroke="#9333ea"/>
  <text x="167" y="438" text-anchor="middle" class="box-title">state.py / context.py</text>
  <text x="167" y="460" text-anchor="middle" class="box-text">State: 共享数据</text>
  <text x="167" y="479" text-anchor="middle" class="tiny">Context: 运行时依赖</text>

  <rect x="330" y="412" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="440" y="438" text-anchor="middle" class="box-title">extract_keywords.py</text>
  <text x="440" y="460" text-anchor="middle" class="box-text">jieba TF-IDF 抽关键词</text>
  <text x="440" y="479" text-anchor="middle" class="tiny">query -> keywords</text>

  <rect x="640" y="396" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="750" y="422" text-anchor="middle" class="box-title">recall_column.py</text>
  <text x="750" y="444" text-anchor="middle" class="box-text">字段语义召回</text>
  <text x="750" y="463" text-anchor="middle" class="tiny">LLM 扩词 -> Embedding -> Qdrant</text>

  <rect x="640" y="486" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="750" y="512" text-anchor="middle" class="box-title">recall_value.py</text>
  <text x="750" y="534" text-anchor="middle" class="box-text">字段取值召回</text>
  <text x="750" y="553" text-anchor="middle" class="tiny">LLM 扩词 -> Elasticsearch</text>

  <rect x="640" y="576" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="750" y="602" text-anchor="middle" class="box-title">recall_metric.py</text>
  <text x="750" y="624" text-anchor="middle" class="box-text">指标语义召回</text>
  <text x="750" y="643" text-anchor="middle" class="tiny">LLM 扩词 -> Embedding -> Qdrant</text>

  <rect x="950" y="486" width="250" height="88" class="box" stroke="#9333ea"/>
  <text x="1075" y="512" text-anchor="middle" class="box-title">merge_retrieved_info.py</text>
  <text x="1075" y="534" text-anchor="middle" class="box-text">合并字段 / 指标 / 字段值</text>
  <text x="1075" y="553" text-anchor="middle" class="box-text">补齐指标依赖字段、主外键、表信息</text>

  <rect x="1270" y="430" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="1380" y="456" text-anchor="middle" class="box-title">filter_table.py</text>
  <text x="1380" y="478" text-anchor="middle" class="box-text">保留哪些表和字段</text>
  <text x="1380" y="497" text-anchor="middle" class="tiny">table_infos -> 精简上下文</text>

  <rect x="1270" y="532" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="1380" y="558" text-anchor="middle" class="box-title">filter_metric.py</text>
  <text x="1380" y="580" text-anchor="middle" class="box-text">保留哪些指标</text>
  <text x="1380" y="599" text-anchor="middle" class="tiny">metric_infos -> 精简上下文</text>

  <rect x="1270" y="634" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="1380" y="660" text-anchor="middle" class="box-title">add_extra_context.py</text>
  <text x="1380" y="682" text-anchor="middle" class="box-text">补充 date_info / db_info</text>
  <text x="1380" y="701" text-anchor="middle" class="tiny">当前日期 + DB 方言/版本</text>

  <rect x="1270" y="736" width="220" height="72" class="box" stroke="#9333ea"/>
  <text x="1380" y="762" text-anchor="middle" class="box-title">generate_sql.py</text>
  <text x="1380" y="784" text-anchor="middle" class="box-text">读取 prompts/generate_sql.prompt</text>
  <text x="1380" y="803" text-anchor="middle" class="tiny">LLM 生成候选 SQL</text>

  <rect x="1540" y="650" width="210" height="72" class="box" stroke="#9333ea"/>
  <text x="1645" y="676" text-anchor="middle" class="box-title">validate_sql.py</text>
  <text x="1645" y="698" text-anchor="middle" class="box-text">normalize / schema repair</text>
  <text x="1645" y="717" text-anchor="middle" class="tiny">DW MySQL EXPLAIN</text>

  <rect x="1540" y="554" width="210" height="72" class="box" stroke="#9333ea"/>
  <text x="1645" y="580" text-anchor="middle" class="box-title">correct_sql.py</text>
  <text x="1645" y="602" text-anchor="middle" class="box-text">读取 prompts/correct_sql.prompt</text>
  <text x="1645" y="621" text-anchor="middle" class="tiny">校验失败时走这里</text>

  <rect x="1540" y="770" width="210" height="72" class="box" stroke="#9333ea"/>
  <text x="1645" y="796" text-anchor="middle" class="box-title">run_sql.py</text>
  <text x="1645" y="818" text-anchor="middle" class="box-text">DW MySQL 执行最终 SQL</text>
  <text x="1645" y="837" text-anchor="middle" class="tiny">writer(result) -> 前端</text>

  <path class="line-blue" d="M 262 448 L 330 448"/>
  <path class="line-blue" d="M 550 448 L 640 432"/>
