  <rect x="30" y="1294" width="1740" height="196" class="band orange"/>
  <text x="58" y="1332" class="section">D. 离线构建链路：app/scripts/build_meta_knowledge.py -> MetaKnowledgeService</text>

  <rect x="80" y="1370" width="270" height="74" class="box" stroke="#ea580c"/>
  <text x="215" y="1396" text-anchor="middle" class="box-title">app/scripts/build_meta_knowledge.py</text>
  <text x="215" y="1418" text-anchor="middle" class="box-text">初始化 Client / Session / Repository</text>
  <text x="215" y="1437" text-anchor="middle" class="tiny">离线构建入口</text>

  <rect x="420" y="1370" width="300" height="74" class="box" stroke="#ea580c"/>
  <text x="570" y="1396" text-anchor="middle" class="box-title">app/services/meta_knowledge_service.py</text>
  <text x="570" y="1418" text-anchor="middle" class="box-text">读取 meta_config.yaml + 查询 DW</text>
  <text x="570" y="1437" text-anchor="middle" class="tiny">组织表/字段/指标/字段值索引</text>

  <rect x="780" y="1370" width="190" height="74" class="box" stroke="#ea580c"/>
  <text x="875" y="1396" text-anchor="middle" class="box-title">Meta MySQL</text>
  <text x="875" y="1418" text-anchor="middle" class="box-text">table_info / column_info</text>
  <text x="875" y="1437" text-anchor="middle" class="tiny">metric_info / column_metric</text>

  <rect x="1020" y="1370" width="170" height="74" class="box" stroke="#ea580c"/>
  <text x="1105" y="1396" text-anchor="middle" class="box-title">Qdrant</text>
  <text x="1105" y="1418" text-anchor="middle" class="box-text">字段向量 / 指标向量</text>
  <text x="1105" y="1437" text-anchor="middle" class="tiny">Embedding 后写入</text>

  <rect x="1240" y="1370" width="190" height="74" class="box" stroke="#ea580c"/>
  <text x="1335" y="1396" text-anchor="middle" class="box-title">Elasticsearch</text>
  <text x="1335" y="1418" text-anchor="middle" class="box-text">字段真实取值索引</text>
  <text x="1335" y="1437" text-anchor="middle" class="tiny">供 recall_value 使用</text>

  <rect x="1480" y="1370" width="220" height="74" class="box" stroke="#ea580c"/>
  <text x="1590" y="1396" text-anchor="middle" class="box-title">conf/meta_config.yaml</text>
  <text x="1590" y="1418" text-anchor="middle" class="box-text">定义表 / 字段 / 指标 / sync</text>
  <text x="1590" y="1437" text-anchor="middle" class="tiny">构建范围由它驱动</text>

