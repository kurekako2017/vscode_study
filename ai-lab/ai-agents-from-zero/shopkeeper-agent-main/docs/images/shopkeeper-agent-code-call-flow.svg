  <text x="1686" y="744" class="note">error == None -> run_sql</text>

  <rect x="30" y="988" width="1740" height="280" class="band green"/>
  <text x="58" y="1026" class="section">C. Repository / Client / Prompt / Config：节点真正依赖的地方</text>

  <rect x="70" y="1076" width="250" height="70" class="box" stroke="#16a34a"/>
  <text x="195" y="1102" text-anchor="middle" class="box-title">app/repositories/mysql/meta/</text>
  <text x="195" y="1124" text-anchor="middle" class="box-text">MetaMySQLRepository</text>
  <text x="195" y="1143" text-anchor="middle" class="tiny">查 table_info / column_info / metric_info</text>

  <rect x="360" y="1076" width="250" height="70" class="box" stroke="#16a34a"/>
  <text x="485" y="1102" text-anchor="middle" class="box-title">app/repositories/mysql/dw/</text>
  <text x="485" y="1124" text-anchor="middle" class="box-text">DWMySQLRepository</text>
  <text x="485" y="1143" text-anchor="middle" class="tiny">获取 DB 信息 / validate / run SQL</text>

  <rect x="650" y="1076" width="250" height="70" class="box" stroke="#16a34a"/>
  <text x="775" y="1102" text-anchor="middle" class="box-title">app/repositories/qdrant/</text>
  <text x="775" y="1124" text-anchor="middle" class="box-text">ColumnQdrantRepository / MetricQdrantRepository</text>
  <text x="775" y="1143" text-anchor="middle" class="tiny">字段 / 指标语义召回</text>

  <rect x="940" y="1076" width="250" height="70" class="box" stroke="#16a34a"/>
  <text x="1065" y="1102" text-anchor="middle" class="box-title">app/repositories/es/</text>
  <text x="1065" y="1124" text-anchor="middle" class="box-text">ValueESRepository</text>
  <text x="1065" y="1143" text-anchor="middle" class="tiny">字段取值全文召回</text>

  <rect x="1230" y="1076" width="250" height="70" class="box" stroke="#16a34a"/>
  <text x="1355" y="1102" text-anchor="middle" class="box-title">prompts/ + app/prompt/</text>
  <text x="1355" y="1124" text-anchor="middle" class="box-text">generate_sql / correct_sql / filter_* / extend_keywords_*</text>
  <text x="1355" y="1143" text-anchor="middle" class="tiny">PromptLoader + LangChain PromptTemplate</text>

  <rect x="1520" y="1076" width="210" height="70" class="box" stroke="#16a34a"/>
  <text x="1625" y="1102" text-anchor="middle" class="box-title">conf/meta_config.yaml</text>
  <text x="1625" y="1124" text-anchor="middle" class="box-text">表 / 字段 / 指标 / sync 配置</text>
  <text x="1625" y="1143" text-anchor="middle" class="tiny">也是离线构建入口</text>

  <rect x="120" y="1188" width="190" height="42" class="smallbox slate"/>
  <text x="215" y="1214" text-anchor="middle" class="box-text">Meta MySQL</text>
  <rect x="430" y="1188" width="190" height="42" class="smallbox slate"/>
  <text x="525" y="1214" text-anchor="middle" class="box-text">DW MySQL</text>
  <rect x="740" y="1188" width="190" height="42" class="smallbox slate"/>
  <text x="835" y="1214" text-anchor="middle" class="box-text">Qdrant</text>
  <rect x="1050" y="1188" width="190" height="42" class="smallbox slate"/>
  <text x="1145" y="1214" text-anchor="middle" class="box-text">Elasticsearch</text>
  <rect x="1360" y="1188" width="190" height="42" class="smallbox slate"/>
  <text x="1455" y="1214" text-anchor="middle" class="box-text">LLM / LangChain</text>
  <rect x="1580" y="1188" width="120" height="42" class="smallbox slate"/>
  <text x="1640" y="1214" text-anchor="middle" class="box-text">YAML 配置</text>

