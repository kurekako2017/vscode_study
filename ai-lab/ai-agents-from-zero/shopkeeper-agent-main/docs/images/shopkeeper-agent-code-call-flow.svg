  <text x="58" y="1488" class="tiny">学习建议：在线链路先看 main.py -> query_router.py -> dependencies.py -> query_service.py -> graph.py；离线链路再看 build_meta_knowledge.py -> meta_knowledge_service.py</text>
</svg>
