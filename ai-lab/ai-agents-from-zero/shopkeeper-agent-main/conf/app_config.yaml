logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: ${oc.env:DB_META_HOST,localhost}
  port: ${oc.env:DB_META_PORT,3306}
  user: ${oc.env:DB_META_USER,didilili}
  password: ${oc.env:DB_META_PASSWORD,dili123}
  database: ${oc.env:DB_META_DATABASE,meta}

db_dw:
  host: ${oc.env:DB_DW_HOST,localhost}
  port: ${oc.env:DB_DW_PORT,3306}
  user: ${oc.env:DB_DW_USER,didilili}
  password: ${oc.env:DB_DW_PASSWORD,dili123}
  database: ${oc.env:DB_DW_DATABASE,dw}

qdrant:
  host: ${oc.env:QDRANT_HOST,localhost}
  port: ${oc.env:QDRANT_PORT,6333}
  embedding_size: ${oc.env:QDRANT_EMBEDDING_SIZE,1024}

embedding:
  host: ${oc.env:EMBEDDING_HOST,localhost}
  port: ${oc.env:EMBEDDING_PORT,8081}
  model: ${oc.env:EMBEDDING_MODEL,BAAI/bge-large-zh-v1.5}

es:
  host: ${oc.env:ES_HOST,localhost}
  port: ${oc.env:ES_PORT,9200}
  index_name: ${oc.env:ES_INDEX_NAME,data_agent}

llm:
  provider_order: ${oc.env:LLM_PROVIDER_ORDER,openrouter,nvidia,ollama}
  model_name: ${oc.env:LLM_MODEL_NAME,openai/gpt-4o-mini}
  api_key: ${oc.env:LLM_API_KEY}
  base_url: ${oc.env:LLM_BASE_URL,https://openrouter.ai/api/v1}
  openrouter_model_name: ${oc.env:OPENROUTER_MODEL_NAME,openai/gpt-4o-mini}
  openrouter_api_key: ${oc.env:OPENROUTER_API_KEY}
  openrouter_base_url: ${oc.env:OPENROUTER_BASE_URL,https://openrouter.ai/api/v1}
  nvidia_model_name: ${oc.env:NVIDIA_MODEL_NAME,nvidia/llama-3.3-nemotron-super-49b-v1}
  nvidia_api_key: ${oc.env:NVIDIA_API_KEY}
  nvidia_base_url: ${oc.env:NVIDIA_BASE_URL,https://integrate.api.nvidia.com/v1}
  ollama_model_name: ${oc.env:OLLAMA_MODEL_NAME,qwen2.5-coder:1.5b}
  ollama_api_key: ${oc.env:OLLAMA_API_KEY,ollama}
  ollama_base_url: ${oc.env:OLLAMA_BASE_URL,http://127.0.0.1:11434/v1}

runtime:
  mock_mode: ${oc.env:MOCK_MODE,false}
