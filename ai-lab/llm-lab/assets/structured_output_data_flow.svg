<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">结构化输出数据流</title>
  <desc id="desc">从用户自然语言需求，到 Pydantic schema、模型解析、Pydantic 对象、JSON 输出的流程。</desc>
  <style>
    .bg { fill: #ffffff; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
    .schema { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
    .mock { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.6; rx: 8; }
    .real { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.6; rx: 8; }
    .output { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.6; rx: 8; }
    .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 16px; }
    .small { font-size: 13px; fill: #475569; }
    .title { font-weight: 700; font-size: 22px; }
    .arrow { stroke: #0f172a; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
    .label { font-size: 13px; fill: #334155; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <rect width="1040" height="520" class="bg" />
  <text x="40" y="44" class="text title">03. 结构化输出数据流</text>
  <text x="40" y="72" class="text small">Prompt 决定任务，Schema 决定返回结构，Pydantic 负责校验和转换。</text>

  <rect x="50" y="120" width="190" height="82" class="box" />
  <text x="145" y="153" text-anchor="middle" class="text">用户自然语言需求</text>
  <text x="145" y="178" text-anchor="middle" class="small">例如：做一个 RAG 学习计划</text>

  <rect x="300" y="120" width="210" height="82" class="schema" />
  <text x="405" y="153" text-anchor="middle" class="text">Pydantic Schema</text>
  <text x="405" y="178" text-anchor="middle" class="small">AgentPlan / TaskPlan</text>

  <rect x="570" y="120" width="190" height="82" class="box" />
  <text x="665" y="153" text-anchor="middle" class="text">generate_plan()</text>
  <text x="665" y="178" text-anchor="middle" class="small">统一封装生成逻辑</text>

  <rect x="820" y="84" width="170" height="70" class="mock" />
  <text x="905" y="113" text-anchor="middle" class="text">mock 模式</text>
  <text x="905" y="136" text-anchor="middle" class="small">build_mock_plan()</text>

  <rect x="820" y="186" width="170" height="70" class="real" />
  <text x="905" y="215" text-anchor="middle" class="text">real 模式</text>
  <text x="905" y="238" text-anchor="middle" class="small">responses.parse()</text>

  <rect x="300" y="320" width="210" height="82" class="output" />
  <text x="405" y="353" text-anchor="middle" class="text">Pydantic 对象</text>
  <text x="405" y="378" text-anchor="middle" class="small">response.output_parsed</text>

  <rect x="590" y="300" width="180" height="70" class="output" />
  <text x="680" y="329" text-anchor="middle" class="text">model_dump()</text>
  <text x="680" y="352" text-anchor="middle" class="small">Python dict</text>

  <rect x="590" y="392" width="180" height="70" class="output" />
  <text x="680" y="421" text-anchor="middle" class="text">model_dump_json()</text>
  <text x="680" y="444" text-anchor="middle" class="small">JSON 字符串</text>

  <rect x="830" y="346" width="160" height="70" class="box" />
  <text x="910" y="375" text-anchor="middle" class="text">后续系统</text>
  <text x="910" y="398" text-anchor="middle" class="small">API / DB / Workflow</text>

  <path d="M240 161 L300 161" class="arrow" />
  <path d="M510 161 L570 161" class="arrow" />
  <path d="M760 145 L820 119" class="arrow" />
  <path d="M760 177 L820 221" class="arrow" />
  <path d="M905 154 L905 284 L405 284 L405 320" class="arrow" />
  <path d="M905 256 L905 284 L405 284 L405 320" class="arrow" />
  <path d="M510 350 L590 335" class="arrow" />
  <path d="M510 372 L590 427" class="arrow" />
  <path d="M770 335 L830 365" class="arrow" />
  <path d="M770 427 L830 397" class="arrow" />

  <text x="790" y="115" class="label">yes</text>
  <text x="790" y="218" class="label">no</text>
</svg>
