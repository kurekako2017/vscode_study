<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <style>
    .box { fill:#f8fafc; stroke:#0f172a; stroke-width:1.6; rx:8; }
    .data { fill:#eef6ff; stroke:#1d4ed8; stroke-width:1.6; rx:8; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size:15px; fill:#0f172a; }
    .small { font-size:13px; fill:#334155; }
    .title { font-weight:700; font-size:20px; }
    .arrow { stroke:#0f172a; stroke-width:1.7; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <text x="40" y="36" class="text title">doc_qa_agent - main.py 详细处理流程</text>

  <rect x="60" y="80" width="230" height="70" class="box" />
  <text x="175" y="110" text-anchor="middle" class="text">parse_args()</text>
  <text x="175" y="132" text-anchor="middle" class="small">question / --docs / --model</text>

  <rect x="345" y="80" width="230" height="70" class="box" />
  <text x="460" y="110" text-anchor="middle" class="text">校验 docs 目录</text>
  <text x="460" y="132" text-anchor="middle" class="small">不存在则 stderr + exit</text>

  <rect x="630" y="80" width="230" height="70" class="box" />
  <text x="745" y="110" text-anchor="middle" class="text">build_chunks()</text>
  <text x="745" y="132" text-anchor="middle" class="small">iter_text_files() + chunk_text()</text>

  <rect x="60" y="230" width="230" height="80" class="data" />
  <text x="175" y="262" text-anchor="middle" class="text">Chunk 列表</text>
  <text x="175" y="285" text-anchor="middle" class="small">source_label + content</text>

  <rect x="345" y="230" width="230" height="80" class="box" />
  <text x="460" y="262" text-anchor="middle" class="text">retrieve()</text>
  <text x="460" y="285" text-anchor="middle" class="small">tokenize() 后按重合度取 TOP_K</text>

  <rect x="630" y="230" width="230" height="80" class="box" />
  <text x="745" y="262" text-anchor="middle" class="text">build_context()</text>
  <text x="745" y="285" text-anchor="middle" class="small">拼接 Retrieved context</text>

  <rect x="345" y="380" width="230" height="80" class="box" />
  <text x="460" y="412" text-anchor="middle" class="text">resolve_mode()</text>
  <text x="460" y="435" text-anchor="middle" class="small">mock / real / auto</text>

  <rect x="630" y="380" width="230" height="80" class="box" />
  <text x="745" y="412" text-anchor="middle" class="text">build_client()</text>
  <text x="745" y="435" text-anchor="middle" class="small">真实模式读取 API Key</text>

  <rect x="345" y="530" width="250" height="80" class="box" />
  <text x="470" y="562" text-anchor="middle" class="text">answer_question()</text>
  <text x="470" y="585" text-anchor="middle" class="small">mock 回答或 Responses API</text>

  <rect x="675" y="530" width="250" height="80" class="box" />
  <text x="800" y="562" text-anchor="middle" class="text">main() 输出</text>
  <text x="800" y="585" text-anchor="middle" class="small">Answer + Sources(score)</text>

  <path d="M290 115 L345 115" class="arrow" />
  <path d="M575 115 L630 115" class="arrow" />
  <path d="M745 150 L745 185 L175 185 L175 230" class="arrow" />
  <path d="M290 270 L345 270" class="arrow" />
  <path d="M575 270 L630 270" class="arrow" />
  <path d="M745 310 L745 350 L460 350 L460 380" class="arrow" />
  <path d="M575 420 L630 420" class="arrow" />
  <path d="M745 460 L745 500 L470 500 L470 530" class="arrow" />
  <path d="M470 610 L470 650 L800 650 L800 610" class="arrow" />

  <text x="40" y="680" class="small">提示：RAG 顺序是先读取和检索，再把少量相关上下文送给模型回答。</text>
</svg>
