services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      SERVICE_NAME: retail-insight-ai
      TASK_EXECUTION_MODE: background
      RESEARCH_PROVIDER: static
      DATA_PROVIDER: static
      CORS_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
      WORKFLOW_STEP_DELAY_SECONDS: "0.05"
      STATIC_RESEARCH_FAIL: "false"
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
