<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="920" viewBox="0 0 1520 920">
  <style>
    .bg { fill: #f8fafc; }
    .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 18; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #475569; }
    .section { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 14; }
    .box-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; rx: 14; }
    .box-green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.8; rx: 14; }
    .box-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 1.8; rx: 14; }
    .box-slate { fill: #f8fafc; stroke: #64748b; stroke-width: 1.6; rx: 14; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 12.5px; fill: #475569; }
    .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 11.5px; fill: #64748b; }
    .arrow { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrowhead); }
    .arrow-soft { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrowheadSoft); stroke-dasharray: 7 6; }
    .step { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #334155; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1520" height="920" class="bg" />

  <text x="48" y="52" class="title">rag_api_demo - main.py 处理流程图</text>
  <text x="48" y="78" class="subtitle">上半部分是前端到后端的问答链路，下半部分是文档更新与重载链路。</text>

  <rect x="34" y="110" width="1452" height="320" class="lane" />
  <text x="60" y="148" class="section">1. 前端请求问答链路</text>

  <rect x="70" y="188" width="170" height="88" class="box-blue" />
  <text x="155" y="221" text-anchor="middle" class="label">前端 / 客户端</text>
  <text x="155" y="243" text-anchor="middle" class="small">React / Spring Boot</text>
  <text x="155" y="262" text-anchor="middle" class="tiny">也可以是 curl / Postman</text>

  <rect x="310" y="188" width="170" height="88" class="box-slate" />
  <text x="395" y="221" text-anchor="middle" class="label">POST /ask</text>
  <text x="395" y="243" text-anchor="middle" class="small">发送 question / model</text>
  <text x="395" y="262" text-anchor="middle" class="tiny">JSON 请求体</text>

  <rect x="550" y="188" width="170" height="88" class="box-green" />
  <text x="635" y="221" text-anchor="middle" class="label">FastAPI 路由</text>
  <text x="635" y="243" text-anchor="middle" class="small">ask(request)</text>
  <text x="635" y="262" text-anchor="middle" class="tiny">进入业务入口</text>

  <rect x="790" y="188" width="170" height="88" class="box-slate" />
  <text x="875" y="221" text-anchor="middle" class="label">ensure_state_loaded()</text>
  <text x="875" y="243" text-anchor="middle" class="small">首次请求时加载</text>
  <text x="875" y="262" text-anchor="middle" class="tiny">避免启动即预热</text>

  <rect x="1030" y="188" width="170" height="88" class="box-slate" />
  <text x="1115" y="221" text-anchor="middle" class="label">retrieve()</text>
  <text x="1115" y="243" text-anchor="middle" class="small">在 chunks 中检索</text>
  <text x="1115" y="262" text-anchor="middle" class="tiny">top_k = 4</text>

  <rect x="1270" y="188" width="170" height="88" class="box-slate" />
  <text x="1355" y="221" text-anchor="middle" class="label">build_context()</text>
  <text x="1355" y="243" text-anchor="middle" class="small">拼接上下文</text>
  <text x="1355" y="262" text-anchor="middle" class="tiny">带来源标签</text>

  <path d="M240 232 L310 232" class="arrow" />
  <path d="M480 232 L550 232" class="arrow" />
  <path d="M720 232 L790 232" class="arrow" />
  <path d="M960 232 L1030 232" class="arrow" />
  <path d="M1200 232 L1270 232" class="arrow" />

  <rect x="430" y="314" width="190" height="88" class="box-amber" />
  <text x="525" y="347" text-anchor="middle" class="label">answer_question()</text>
  <text x="525" y="369" text-anchor="middle" class="small">mock / real 分支</text>
  <text x="525" y="388" text-anchor="middle" class="tiny">返回回答文本</text>

  <rect x="690" y="314" width="190" height="88" class="box-blue" />
  <text x="785" y="347" text-anchor="middle" class="label">AskResponse</text>
  <text x="785" y="369" text-anchor="middle" class="small">answer / sources</text>
  <text x="785" y="388" text-anchor="middle" class="tiny">source_count / docs_dir</text>

  <rect x="950" y="314" width="220" height="88" class="box-green" />
  <text x="1060" y="347" text-anchor="middle" class="label">前端渲染结果</text>
  <text x="1060" y="369" text-anchor="middle" class="small">展示答案 + 来源</text>
  <text x="1060" y="388" text-anchor="middle" class="tiny">页面 / 控制台 / 日志</text>

  <path d="M1355 276 L1355 308 L620 308 L620 358 L620 358" class="arrow" />
  <path d="M620 358 L690 358" class="arrow" />
  <path d="M880 358 L950 358" class="arrow" />

  <path d="M525 314 L525 300 L875 300 L875 276" class="arrow-soft" />
  <text x="642" y="292" class="step">如果是 mock，直接返回模拟结果</text>

  <rect x="34" y="470" width="1452" height="392" class="lane" />
  <text x="60" y="508" class="section">2. 文档更新与重载链路</text>

  <rect x="70" y="548" width="190" height="88" class="box-blue" />
  <text x="165" y="581" text-anchor="middle" class="label">文档目录</text>
  <text x="165" y="603" text-anchor="middle" class="small">docs / RAG_API_DOCS_DIR</text>
  <text x="165" y="622" text-anchor="middle" class="tiny">.md / .txt / .pdf</text>

  <rect x="330" y="548" width="170" height="88" class="box-slate" />
  <text x="415" y="581" text-anchor="middle" class="label">POST /reload</text>
  <text x="415" y="603" text-anchor="middle" class="small">手动刷新索引</text>
  <text x="415" y="622" text-anchor="middle" class="tiny">文档修改后调用</text>

  <rect x="560" y="548" width="170" height="88" class="box-green" />
  <text x="645" y="581" text-anchor="middle" class="label">load_state()</text>
  <text x="645" y="603" text-anchor="middle" class="small">重建内存状态</text>
  <text x="645" y="622" text-anchor="middle" class="tiny">chunks / client</text>

  <rect x="790" y="548" width="170" height="88" class="box-slate" />
  <text x="875" y="581" text-anchor="middle" class="label">read_document_text()</text>
  <text x="875" y="603" text-anchor="middle" class="small">读取文本内容</text>
  <text x="875" y="622" text-anchor="middle" class="tiny">PDF / 文本文件</text>

  <rect x="1020" y="548" width="170" height="88" class="box-slate" />
  <text x="1105" y="581" text-anchor="middle" class="label">chunk_text()</text>
  <text x="1105" y="603" text-anchor="middle" class="small">切分带重叠块</text>
  <text x="1105" y="622" text-anchor="middle" class="tiny">保留上下文</text>

  <rect x="1250" y="548" width="190" height="88" class="box-blue" />
  <text x="1345" y="581" text-anchor="middle" class="label">app.state.chunks</text>
  <text x="1345" y="603" text-anchor="middle" class="small">写入缓存</text>
  <text x="1345" y="622" text-anchor="middle" class="tiny">供 /ask /health 使用</text>

  <path d="M260 592 L330 592" class="arrow" />
  <path d="M500 592 L560 592" class="arrow" />
  <path d="M730 592 L790 592" class="arrow" />
  <path d="M960 592 L1020 592" class="arrow" />
  <path d="M1190 592 L1250 592" class="arrow" />

  <rect x="560" y="684" width="170" height="88" class="box-amber" />
  <text x="645" y="717" text-anchor="middle" class="label">GET /health</text>
  <text x="645" y="739" text-anchor="middle" class="small">查看状态</text>
  <text x="645" y="758" text-anchor="middle" class="tiny">docs_dir / chunk_count</text>

  <rect x="790" y="684" width="230" height="88" class="box-green" />
  <text x="905" y="717" text-anchor="middle" class="label">前端确认刷新结果</text>
  <text x="905" y="739" text-anchor="middle" class="small">先看 health，再问 ask</text>
  <text x="905" y="758" text-anchor="middle" class="tiny">保证前后端看到同一份资料</text>

  <path d="M1355 636 L1355 676 L730 676" class="arrow-soft" />
  <path d="M730 728 L790 728" class="arrow" />

  <text x="60" y="860" class="subtitle">说明：这张图对应 main.py 的实际处理逻辑，服务端负责加载、检索、拼上下文、生成答案，再把结构化 JSON 返回给前端。</text>
</svg>
